name: First CI Pipeline

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Testing
        run: go test ./...

      - name: Build binary
        run: go build -o app ./cmd/app/main.go

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-binary-artifact        # Имя артефакта в интерфейсе
          path: ./                        # Путь к файлу/папке
          if-no-files-found: error        # Ошибка, если бинарник не создался
      