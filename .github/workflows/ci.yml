name: First CI Pipeline

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: build
        uses: actions/upload-artifact@v4
        with:
          run: go build -o app

      - name: testing
        run: go test ./...
      